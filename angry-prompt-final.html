<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😤 Angry Prompt Builder v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ── 라이트/다크 토큰 ── */
:root{
  --bg:#ffffff;--surface:#f8f8f8;--card:#f2f2f2;
  --border:#e0e0e0;--border2:#c8c8c8;
  --text:#0a0a0a;--muted:#999;--sub:#555;
  --accent:#000000;--accent2:#333;
  --green:#16a34a;--red:#dc2626;
  --chip-bg:#ffffff;--chip-active-bg:#000;--chip-active-text:#fff;
  --input-bg:#fff;--textarea-bg:#fafafa;
  --tab-active:#000;--result-bg:#f8f8f8;
  --topic-active-bg:#000;--topic-active-text:#fff;
}
body.dark{
  --bg:#0a0a0a;--surface:#111;--card:#1a1a1a;
  --border:#2a2a2a;--border2:#3a3a3a;
  --text:#f0f0f0;--muted:#555;--sub:#aaa;
  --accent:#ffffff;--accent2:#ccc;
  --chip-bg:#1a1a1a;--chip-active-bg:#fff;--chip-active-text:#000;
  --input-bg:#1a1a1a;--textarea-bg:#111;
  --tab-active:#fff;--result-bg:#111;
  --topic-active-bg:#fff;--topic-active-text:#000;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;transition:background 0.25s,color 0.25s;
}

/* ── 다크모드 토글 ── */
.dark-toggle{
  position:fixed;top:16px;right:16px;z-index:1000;
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--border2);background:var(--card);
  color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.dark-toggle:hover{background:var(--accent);color:var(--bg);}

/* ── HEADER ── */
header{
  padding:40px 20px 28px;
  text-align:center;
  border-bottom:1px solid var(--border);
}
.logo{
  font-size:clamp(22px,4vw,40px);
  font-weight:900;
  color:var(--text);
  letter-spacing:-1px;
  line-height:1.1;
}
.tagline{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}

.wrap{max-width:860px;margin:0 auto;padding:0 20px 100px;}

/* ── STEP ── */
.step{margin-bottom:28px;opacity:0.3;pointer-events:none;transition:opacity 0.3s;}
.step.active{opacity:1;pointer-events:all;}
.step.done{opacity:0.65;pointer-events:all;}
.step-hd{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
.step-num{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--sub);flex-shrink:0;
  transition:all 0.2s;
}
.step.done .step-num{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.step-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;flex:1;color:var(--sub);}
.step.active .step-title{color:var(--text);}
.step-actions{display:flex;gap:6px;flex-wrap:wrap;}

/* ── BUTTONS ── */
.btn-sm{
  padding:5px 12px;border-radius:6px;
  border:1px solid var(--border2);background:transparent;
  color:var(--sub);font-size:11px;cursor:pointer;
  transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;
}
.btn-sm:hover{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn-sm:disabled{opacity:0.35;cursor:not-allowed;}
.btn-sm.blue{color:var(--sub);border-color:var(--border2);}
.btn-sm.blue:hover{background:var(--accent);color:var(--bg);border-color:var(--accent);}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  padding:7px 13px;border-radius:6px;
  border:1px solid var(--border);background:var(--chip-bg);
  color:var(--muted);font-size:12px;cursor:pointer;
  transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;
  user-select:none;display:flex;align-items:center;gap:5px;
}
.chip:hover{border-color:var(--border2);color:var(--text);}
.chip.active{
  background:var(--chip-active-bg);border-color:var(--chip-active-bg);
  color:var(--chip-active-text);font-weight:700;
}
.chip .del{color:var(--border2);font-size:10px;transition:color 0.15s;}
.chip.active .del{color:rgba(255,255,255,0.4);}
body.dark .chip.active .del{color:rgba(0,0,0,0.4);}

.form-chips .chip.active{background:var(--accent);border-color:var(--accent);color:var(--bg);}
.topic-chips .chip{font-size:11px;padding:5px 10px;}
.topic-chips .chip.active{background:var(--topic-active-bg);border-color:var(--topic-active-bg);color:var(--topic-active-text);}

/* ── INPUT ── */
.input-row{display:flex;gap:8px;margin-top:10px;}
input[type=text]{
  flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;
  padding:9px 13px;outline:none;transition:border-color 0.2s;
}
input[type=text]:focus{border-color:var(--accent);}
input[type=text]::placeholder{color:var(--muted);}
.add-btn{
  padding:9px 16px;border-radius:7px;border:1px solid var(--border2);
  background:transparent;color:var(--sub);font-size:16px;cursor:pointer;transition:all 0.15s;
}
.add-btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent);}

/* ── DIALOGUE ── */
.dialogue-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:16px;
}
.sec-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.dialogue-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px;}
textarea{
  width:100%;background:var(--textarea-bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.75;
  padding:11px 13px;resize:none;outline:none;transition:border-color 0.2s;
}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--muted);}
.dialogue-note{font-size:11px;color:var(--muted);margin-top:7px;}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:28px 0;}
.summary-bar{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:11px 15px;margin-bottom:18px;font-size:12px;color:var(--muted);line-height:1.9;min-height:42px;
}
.summary-bar b{color:var(--text);font-weight:700;}
.err{
  display:none;padding:10px 14px;background:rgba(220,38,38,0.06);
  border:1px solid rgba(220,38,38,0.2);border-radius:7px;color:var(--red);font-size:13px;margin-bottom:13px;
}

/* ── GEN BUTTON ── */
.gen-btn{
  width:100%;padding:16px;border:none;border-radius:8px;
  background:var(--accent);color:var(--bg);
  font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin-bottom:28px;
}
.gen-btn:hover{opacity:0.85;transform:translateY(-1px);}
.gen-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* ── RESULT ── */
.result-wrap{display:none;}
.result-wrap.show{display:block;animation:fadeUp 0.35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border);}
.tab{
  padding:9px 20px;background:transparent;border:none;
  border-bottom:2px solid transparent;color:var(--muted);font-size:12px;cursor:pointer;
  transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;margin-bottom:-1px;
}
.tab.active{color:var(--tab-active);border-bottom-color:var(--tab-active);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.result-card{
  background:var(--result-bg);border:1px solid var(--border);border-radius:10px;padding:20px;
}
.result-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.result-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.copy-btn{
  padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;
  color:var(--sub);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;
}
.copy-btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.copy-btn.ok{border-color:var(--green)!important;color:var(--green)!important;}
.result-text{font-size:13px;line-height:1.9;color:var(--sub);white-space:pre-wrap;word-break:break-word;}

.badge-real{
  display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;
  letter-spacing:1px;background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.2);
  color:var(--red);margin-left:4px;
}
.style-note{
  font-size:11px;padding:6px 10px;border-radius:6px;
  background:var(--surface);border:1px solid var(--border);color:var(--sub);margin-top:8px;display:none;
}
/* ── 코드 입력 화면 ── */
.gate{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.gate-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px 32px;max-width:380px;width:90%;text-align:center;}
.gate-logo{font-size:32px;font-weight:900;color:var(--text);letter-spacing:-1px;margin-bottom:6px;}
.gate-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.gate-input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;padding:12px 16px;outline:none;text-align:center;letter-spacing:3px;font-family:monospace;margin-bottom:12px;transition:border-color 0.2s;}
.gate-input:focus{border-color:var(--accent);}
.gate-btn{width:100%;padding:13px;border:none;border-radius:8px;background:var(--accent);color:var(--bg);font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.gate-btn:hover{opacity:0.8;}
.gate-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}
.gate-admin-link{font-size:11px;color:var(--muted);cursor:pointer;margin-top:16px;text-decoration:underline;}

/* ── 관리자 패널 ── */
.admin-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998;align-items:center;justify-content:center;}
.admin-panel.show{display:flex;}
.admin-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;}
.admin-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;}
.stat-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.stat-label{color:var(--muted);}
.stat-val{color:var(--text);font-weight:700;}
.admin-section{margin-top:20px;}
.admin-section-title{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.code-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;background:var(--surface);margin-bottom:6px;font-size:13px;}
.code-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.code-badge.active{background:rgba(22,163,74,0.1);color:#16a34a;border:1px solid rgba(22,163,74,0.3);}
.code-badge.inactive{background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,0.3);}
.admin-input-row{display:flex;gap:8px;margin-top:8px;}
.admin-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:8px 12px;outline:none;font-family:monospace;}
.admin-btn{padding:8px 16px;border-radius:6px;border:1.5px solid var(--accent);background:var(--accent);color:var(--bg);font-size:12px;cursor:pointer;font-weight:700;font-family:inherit;white-space:nowrap;}
.admin-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}

</head>
<body>

<!-- 코드 입력 게이트 -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-logo">😤</div>
    <div class="gate-sub">Angry Prompt Builder</div>
    <input type="password" class="gate-input" id="gateInput" placeholder="접속 코드 입력" onkeydown="if(event.key==='Enter')verifyCode()">
    <button class="gate-btn" onclick="verifyCode()">입장하기</button>
    <div class="gate-err" id="gateErr">잘못된 접속 코드입니다.</div>
    <div class="gate-admin-link" onclick="showAdminLogin()">관리자</div>
  </div>
</div>

<!-- 관리자 로그인 -->
<div class="gate" id="adminGate" style="display:none;">
  <div class="gate-box">
    <div class="gate-logo">⚙️</div>
    <div class="gate-sub">관리자 로그인</div>
    <input type="password" class="gate-input" id="adminPwInput" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="gate-btn" onclick="adminLogin()">로그인</button>
    <div class="gate-err" id="adminErr">비밀번호가 틀렸습니다.</div>
    <div class="gate-admin-link" onclick="showGate()">← 돌아가기</div>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-box">
    <button class="admin-close" onclick="closeAdmin()">✕</button>
    <div class="admin-title">⚙️ 관리자 패널</div>
    <div class="stat-row"><span class="stat-label">오늘 방문자</span><span class="stat-val" id="statToday">-</span></div>
    <div class="stat-row"><span class="stat-label">총 방문자</span><span class="stat-val" id="statTotal">-</span></div>
    <div class="stat-row"><span class="stat-label">총 생성 횟수</span><span class="stat-val" id="statGen">-</span></div>
    <div class="admin-section">
      <div class="admin-section-title">접속 코드 관리</div>
      <div id="codeList"></div>
      <div class="admin-input-row">
        <input type="text" class="admin-input" id="newCodeInput" placeholder="새 코드 입력">
        <button class="admin-btn" onclick="addCode()">추가</button>
      </div>
    </div>
  </div>
</div>

<button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="다크/라이트 모드">☀️</button>

<header>
  <div class="logo">😤 Angry Prompt Builder</div>
  <div class="tagline">AI 영상 프롬프트 생성기 · 스타일별 분기 · 공감 대사</div>
</header>

<!-- API 키 입력 -->
<div id="apiKeyBanner" style="background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;">
  <div style="max-width:860px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--muted);white-space:nowrap;letter-spacing:1px;">🔑 API KEY</span>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." style="flex:1;min-width:180px;background:var(--input-bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;padding:7px 12px;outline:none;font-family:monospace;">
      <button onclick="saveApiKey()" style="padding:7px 16px;border-radius:7px;border:1.5px solid var(--accent);background:var(--accent);color:var(--bg);font-size:12px;cursor:pointer;white-space:nowrap;font-weight:700;font-family:inherit;">저장</button>
      <button onclick="clearApiKey()" style="padding:7px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;">삭제</button>
    </div>
    <div id="apiKeyStatus" style="font-size:11px;margin-top:5px;color:var(--muted);">API 키를 입력하면 AI 대사 생성 기능이 활성화됩니다.</div>
  </div>
</div>

<div class="wrap">

<!-- S1: 카테고리 -->
<div class="step active" id="s1">
  <div class="step-hd">
    <div class="step-num">1</div><div class="step-title">카테고리</div>
    <div class="step-actions"><button class="btn-sm" onclick="aiRandom(1)">🎲 랜덤</button></div>
  </div>
  <div class="chips" id="catChips">
    <div class="chip" data-val="food" onclick="selCat(this)">🍔 음식·음료</div>
    <div class="chip" data-val="object" onclick="selCat(this)">📦 생활용품</div>
    <div class="chip" data-val="electronics" onclick="selCat(this)">💻 전자제품</div>
    <div class="chip" data-val="furniture" onclick="selCat(this)">🪑 가구·인테리어</div>
    <div class="chip" data-val="vehicle" onclick="selCat(this)">🚗 탈것</div>
    <div class="chip" data-val="animal" onclick="selCat(this)">🐾 동물</div>
    <div class="chip" data-val="nature" onclick="selCat(this)">🌿 자연물</div>
    <div class="chip" data-val="toy" onclick="selCat(this)">🧸 장난감·피규어</div>
    <div class="chip" data-val="stationery" onclick="selCat(this)">✏️ 문구류</div>
    <div class="chip" data-val="sports" onclick="selCat(this)">⚽ 스포츠용품</div>
    <div class="chip" data-val="fashion" onclick="selCat(this)">👟 패션·잡화</div>
    <div class="chip" data-val="building" onclick="selCat(this)">🏢 건물·구조물</div>
    <div class="chip" data-val="kitchen" onclick="selCat(this)">🍳 주방용품</div>
    <div class="chip" data-val="tool" onclick="selCat(this)">🔧 공구·장비</div>
    <div class="chip" data-val="person" onclick="selCat(this)">🧑 인물 <span class="badge-real">실사</span></div>
  </div>
</div>

<!-- S2: 숏폼/롱폼 -->
<div class="step" id="s2">
  <div class="step-hd"><div class="step-num">2</div><div class="step-title">콘텐츠 형식</div></div>
  <div class="chips form-chips" id="formChips">
    <div class="chip active" data-val="short" onclick="selForm(this)">📱 숏폼 (9:16 · ~60초)</div>
    <div class="chip" data-val="long" onclick="selForm(this)">🎞️ 롱폼 (16:9 · ~120초)</div>
  </div>
</div>

<!-- S3: 오브젝트 -->
<div class="step" id="s3">
  <div class="step-hd">
    <div class="step-num">3</div><div class="step-title">오브젝트</div>
    <div class="step-actions"><button class="btn-sm" onclick="aiRandom(3)">🎲 AI 새로 생성</button></div>
  </div>
  <div class="chips" id="objChips"></div>
  <div class="input-row">
    <input type="text" id="objInput" placeholder="직접 입력: 예) 치아, 냄비, 쓰레기봉투">
    <button class="add-btn" onclick="addCustom('obj')">+</button>
  </div>
</div>

<!-- S4: 장소 -->
<div class="step" id="s4">
  <div class="step-hd">
    <div class="step-num">4</div><div class="step-title">배경 장소</div>
    <div class="step-actions"><button class="btn-sm" onclick="aiRandom(4)">🎲 AI 새로 생성</button></div>
  </div>
  <div class="chips" id="locChips"></div>
  <div class="input-row">
    <input type="text" id="locInput" placeholder="직접 입력: 예) 새벽 3시 편의점 앞 골목">
    <button class="add-btn" onclick="addCustom('loc')">+</button>
  </div>
</div>

<!-- S5: 스타일 -->
<div class="step" id="s5">
  <div class="step-hd">
    <div class="step-num">5</div><div class="step-title">비주얼 스타일</div>
    <div class="step-actions"><button class="btn-sm" onclick="aiRandom(5)">🎲 랜덤</button></div>
  </div>
  <div class="chips" id="styleChips">

// ── 서버 설정 ─────────────────────────────────────────────
const SERVER = 'https://angry-prompt-server-angry-prompt.up.railway.app';
let adminPw = null;

// ── 게이트 (코드 입력) ────────────────────────────────────
async function verifyCode(){
  const code = document.getElementById('gateInput').value.trim();
  if(!code) return;
  try {
    const r = await fetch(`${SERVER}/verify`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code})
    });
    const d = await r.json();
    if(d.ok){
      document.getElementById('gate').style.display='none';
      sessionStorage.setItem('verified','1');
    } else {
      document.getElementById('gateErr').style.display='block';
      document.getElementById('gateInput').value='';
    }
  } catch(e){
    // 서버 오류시 임시 통과 (개발용)
    document.getElementById('gateErr').textContent='서버 연결 오류. 잠시 후 다시 시도해주세요.';
    document.getElementById('gateErr').style.display='block';
  }
}

function showAdminLogin(){
  document.getElementById('gate').style.display='none';
  document.getElementById('adminGate').style.display='flex';
}
function showGate(){
  document.getElementById('adminGate').style.display='none';
  document.getElementById('gate').style.display='flex';
}

async function adminLogin(){
  const pw = document.getElementById('adminPwInput').value.trim();
  const r = await fetch(`${SERVER}/admin/login`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password:pw})
  });
  const d = await r.json();
  if(d.ok){
    adminPw = pw;
    document.getElementById('adminGate').style.display='none';
    document.getElementById('gate').style.display='none';
    sessionStorage.setItem('verified','1');
    openAdminPanel();
  } else {
    document.getElementById('adminErr').style.display='block';
  }
}

async function openAdminPanel(){
  const r = await fetch(`${SERVER}/admin/stats`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password:adminPw})
  });
  const d = await r.json();
  if(d.ok){
    document.getElementById('statToday').textContent = d.stats.todayVisits;
    document.getElementById('statTotal').textContent = d.stats.totalVisits;
    document.getElementById('statGen').textContent = d.stats.totalGenerates;
    const codeList = document.getElementById('codeList');
    codeList.innerHTML = '';
    d.stats.codes.forEach(c=>{
      codeList.innerHTML += `
        <div class="code-row">
          <span style="font-family:monospace;">${c.code}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="code-badge ${c.is_active?'active':'inactive'}">${c.is_active?'활성':'비활성'}</span>
            <button onclick="toggleCode('${c.code}')" style="padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;">${c.is_active?'비활성화':'활성화'}</button>
          </div>
        </div>`;
    });
  }
  document.getElementById('adminPanel').classList.add('show');
}

async function addCode(){
  const code = document.getElementById('newCodeInput').value.trim();
  if(!code) return;
  await fetch(`${SERVER}/admin/codes/add`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password:adminPw, code})
  });
  document.getElementById('newCodeInput').value='';
  openAdminPanel();
}

async function toggleCode(code){
  await fetch(`${SERVER}/admin/codes/toggle`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password:adminPw, code})
  });
  openAdminPanel();
}

function closeAdmin(){ document.getElementById('adminPanel').classList.remove('show'); }

// 세션 유지
window.addEventListener('load',()=>{
  if(sessionStorage.getItem('verified')==='1'){
    document.getElementById('gate').style.display='none';
  }
});

function makeChip(label,val,onClick){
  const d=document.createElement('div');d.className='chip';d.dataset.val=val;
  const s=document.createElement('span');s.textContent=label;
  const x=document.createElement('span');x.className='del';x.textContent=' ✕';
  x.onclick=e=>{e.stopPropagation();d.remove();};
  d.appendChild(s);d.appendChild(x);d.onclick=onClick;return d;
}

// ── AI 랜덤 ─────────────────────────────────────────────
async function aiRandom(step){
  if(step===1){
    const cats=Object.keys(DB);
    const el=document.querySelector(`#catChips .chip[data-val="${cats[Math.floor(Math.random()*cats.length)]}"]`);
    if(el)selCat(el);return;
  }
  if(step===3){
    if(!S.cat)return showErr('카테고리를 먼저 선택해주세요.');
    const btn=document.querySelector('#s3 .btn-sm');btn.textContent='⏳...';btn.disabled=true;
    try{
      const r=await callAI('창의적인 오브젝트 생성기. JSON만. {"items":[{"kr":"한글명","en":"English"},...]}',
        `카테고리: ${S.cat}\n독특하고 재미있는 오브젝트 8개 새로 생성. JSON만.`);
      const d=JSON.parse(r.replace(/```json|```/g,'').trim());
      d.items.forEach(o=>document.getElementById('objChips').appendChild(makeChip('✨ '+o.kr,o.en,()=>selObj(o.kr,o.en))));
    }catch(e){showErr('AI 생성 실패');}
    finally{btn.textContent='🎲 AI 새로 생성';btn.disabled=false;}return;
  }
  if(step===4){
    if(!S.cat)return;
    const btn=document.querySelector('#s4 .btn-sm');btn.textContent='⏳...';btn.disabled=true;
    try{
      const r=await callAI('배경 장소 생성기. JSON만. {"items":[{"kr":"한글 장소","en":"English location"},...]}',
        `카테고리: ${S.cat}, 오브젝트: ${S.obj||'미지정'}\n어울리는 배경 장소 6개 생성. JSON만.`);
      const d=JSON.parse(r.replace(/```json|```/g,'').trim());
      d.items.forEach(l=>document.getElementById('locChips').appendChild(makeChip('✨📍 '+l.kr,l.en,()=>selLoc(l.kr,l.en))));
    }catch(e){showErr('AI 생성 실패');}
    finally{btn.textContent='🎲 AI 새로 생성';btn.disabled=false;}return;
  }
  if(step===5){
    const chips=document.querySelectorAll('#styleChips .chip');
    selStyle(chips[Math.floor(Math.random()*chips.length)]);return;
  }
  if(step===6){
    const chips=document.querySelectorAll('#moodChips .chip');
    selMood(chips[Math.floor(Math.random()*chips.length)]);return;
  }
}

// ── 대사 자동생성 ────────────────────────────────────────
async function autoDialogue(){await genDialogue(false);}
async function regenDialogue(){await genDialogue(true);}
async function genDialogue(regen){
  const btns=document.querySelectorAll('.dialogue-btns .btn-sm');
  btns.forEach(b=>b.disabled=true);
  const topicDesc=TOPIC_DESC[S.topic]||'일상 공감 상황';
  const dur=S.dur==='30'?'30초 분량 — 상황설명(2문장) → 공감포인트(2문장) → 직접 훈계/호소(3~4문장) 흐름으로 자연스럽게':'10초 분량 — 2~3문장, 짧고 강렬하게';
  const obj=S.obj||'캐릭터';
  const styleTone=STYLE_DIALOGUE_TONE[S.style]||'자연스러운 한국어 구어체';
  const avoid=usedDialogues.length>0?`\n⚠️ 아래와 완전히 다른 상황·표현으로:\n${usedDialogues.slice(-3).join('\n---\n')}`:'';
  try{
    const txt=await callAI(
      `SNS 숏폼 영상용 공감 대사 작가.
규칙:
- 한국어 대사만 출력 (설명 없이)
- 화만 내는게 아니라 공감되는 상황 + 감정이 섞인 대사
- 시청자가 "맞아 진짜 저거 공감돼" 라고 느낄 수 있어야 함
- 댓글 달고 싶어지는 내용
- 스타일 톤 필수 반영: ${styleTone}
- ${dur}`,
      `오브젝트: ${obj}\n주제: ${topicDesc}\n스타일: ${styleTone}\n분량: ${dur}\n이 오브젝트가 화가 나서 저 주제에 대해 공감 가는 대사를 써줘.${avoid}`
    );
    document.getElementById('dialogue').value=txt.trim();
    usedDialogues.push(txt.trim());
    if(usedDialogues.length>10)usedDialogues.shift();
  }catch(e){showErr('대사 생성 실패: '+e.message);}
  finally{btns.forEach(b=>b.disabled=false);}
}

// ── 프롬프트 생성 (스타일별 분기) ────────────────────────
async function generate(){
  if(!S.obj)return showErr('오브젝트를 선택해주세요.');
  if(!S.loc)return showErr('장소를 선택해주세요.');
  if(!S.style)return showErr('스타일을 선택해주세요.');
  hideErr();
  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.textContent='⏳ 생성 중...';

  const dialogue=document.getElementById('dialogue').value.trim()||'왜 이러는 거야, 진짜!';
  const moodEn=MOOD_MAP[S.mood]?.en||MOOD_MAP.angry.en;
  const isLong=S.form==='long';
  const isPerson=S.cat==='person';
  const ratio=isLong?'16:9 widescreen cinematic':'9:16 vertical short-form';
  const platform=isLong?'Kling | Max: 120s':'Kling | Max: 60s';
  const objEn=S.objEn||S.obj;
  const locEn=S.locEn||S.loc;
  const styleTpl=STYLE_PROMPTS[S.style];

  const imagePrompt=styleTpl.image(objEn,locEn,moodEn,ratio,isPerson);
  const videoPrompt=styleTpl.video(objEn,locEn,moodEn,dialogue,ratio,platform,isPerson);

  document.getElementById('imgOut').textContent=imagePrompt;
  document.getElementById('vidOut').textContent=videoPrompt;

  const wrap=document.getElementById('resultWrap');
  wrap.classList.add('show');
  switchTab('img');
  wrap.scrollIntoView({behavior:'smooth',block:'start'});
  btn.disabled=false;btn.textContent='🔥 프롬프트 생성하기';

  // 사용 횟수 기록
  fetch(`${SERVER}/stats/record`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'generate'})}).catch(()=>{});
}

// ── API 키 관리 ──────────────────────────────────────────
function saveApiKey(){
  const key=document.getElementById('apiKeyInput').value.trim();
  if(!key){showErr('API 키를 입력해주세요.');return;}
  if(!key.startsWith('sk-ant-')){showErr('올바른 Anthropic API 키 형식이 아닙니다. (sk-ant- 로 시작)');return;}
  localStorage.setItem('anthropic_api_key',key);
  document.getElementById('apiKeyStatus').textContent='✅ API 키가 저장되었습니다. AI 기능을 사용할 수 있습니다.';
  document.getElementById('apiKeyStatus').style.color='#22c55e';
  document.getElementById('apiKeyInput').value='sk-ant-••••••••••••••••••••••';
}
function clearApiKey(){
  localStorage.removeItem('anthropic_api_key');
  document.getElementById('apiKeyInput').value='';
  document.getElementById('apiKeyStatus').textContent='API 키가 삭제되었습니다.';
  document.getElementById('apiKeyStatus').style.color='#f87171';
}
function getApiKey(){
  return localStorage.getItem('anthropic_api_key')||'';
}
// 페이지 로드 시 키 상태 확인
window.addEventListener('load',()=>{
  const saved=getApiKey();
  if(saved){
    document.getElementById('apiKeyInput').value='sk-ant-••••••••••••••••••••••';
    document.getElementById('apiKeyStatus').textContent='✅ 저장된 API 키가 있습니다. AI 기능을 사용할 수 있습니다.';
    document.getElementById('apiKeyStatus').style.color='#22c55e';
  }
});

// ── 공통 ─────────────────────────────────────────────────
async function callAI(system,user){
  const apiKey=getApiKey();
  if(!apiKey){
    showErr('API 키를 먼저 입력해주세요. 상단의 🔑 입력란에 Anthropic API 키를 입력하고 저장 버튼을 누르세요.');
    throw new Error('API 키 없음');
  }
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system,messages:[{role:'user',content:user}]})
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(err?.error?.message||`API 오류 (${res.status})`);
  }
  const d=await res.json();
  return d.content?.map(b=>b.text||'').join('')||'';
}

function act(id){const e=document.getElementById(id);e.classList.add('active');e.classList.remove('done');}
function done(id){const e=document.getElementById(id);e.classList.add('active','done');}
function deact(id){const e=document.getElementById(id);e.classList.remove('active','done');}

function updateSummary(){
  const p=[];
  if(S.cat)p.push(`카테고리: <b>${S.cat}</b>`);
  if(S.form)p.push(`형식: <b>${S.form==='short'?'숏폼':'롱폼'}</b>`);
  if(S.obj)p.push(`오브젝트: <b>${S.obj}</b>`);
  if(S.loc)p.push(`장소: <b>${S.loc}</b>`);
  if(S.style)p.push(`스타일: <b>${S.style}</b>`);
  p.push(`무드: <b>${S.mood}</b>`);
  document.getElementById('summaryBar').innerHTML=p.join(' · ');
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['img','vid'][i]===t));
  ['panelImg','panelVid'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  document.getElementById(t==='img'?'panelImg':'panelVid')?.classList.add('active');
}

function doCopy(textId, btnId){
  const text=document.getElementById(textId).textContent;
  const btn=document.getElementById(btnId);
  if(!text.trim()){showErr('복사할 내용이 없습니다. 먼저 프롬프트를 생성해주세요.');return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✅ 복사됨!';
    btn.classList.add('ok');
    setTimeout(()=>{
      btn.textContent='📋 복사';
      btn.classList.remove('ok');
    },2000);
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='✅ 복사됨!';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='📋 복사';btn.classList.remove('ok');},2000);
  });
}

function showErr(m){const e=document.getElementById('errMsg');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}
function hideErr(){document.getElementById('errMsg').style.display='none';}
updateSummary();
</script>
